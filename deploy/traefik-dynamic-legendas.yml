# Traefik file provider — long timeouts for video upload (unlimited body via nginx client_max_body_size 0).
# Do NOT enable buffering middleware here — it breaks streaming uploads and causes 413.
# Copy to Traefik's dynamic config dir (e.g. /etc/traefik/dynamic/).
# setup.sh tries common paths automatically.

http:
  serversTransports:
    legendas-long:
      forwardingTimeouts:
        dialTimeout: 30s
        responseHeaderTimeout: 7200s
        idleTimeout: 7200s
